# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

[username]
format = "[ в•ӯв”Җ$user]($style)"
style_user = "bold blue"
style_root = "bold blue"
show_always = true

[hostname]
format = "[@$hostname]($style) in "
style = "bold dimmed blue"
ssh_only = false
disabled = false

[character]
success_symbol = "[ в•°в”ҖО»](bold blue)"
error_symbol = "[пҒұ ](bold red)"

[cmd_duration]
min_time = 10_000
format = "took [$duration пү’ ]($style)"

[directory]
style = "green"
truncation_length = 0
truncate_to_repo = true
truncation_symbol = "о—» "

[status]
symbol = 'в•°в”Җ'
format = '[ $symbol\[$common_meaning$signal_name$maybe_int\]]($style)'
disabled = false

# Monokai Classic 'color6' here
[git_branch]
style = "bold #fd971f"

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
am = '[рҹ“¬ APPLYING MAILS](bold purple)'
bisect = '[рҹ”Һ BISECTING](bold cyan)'
cherry_pick = '[рҹҚ’ PICKING](bold red)'
merge = '[рҹ”Җ MERGING](bold green)'
rebase = '[рҹҢұ REBASING](bold yellow)'
revert = '[вҶ©пёҸ REVERTING](bold blue)'

[git_status]
format = '[$staged$modified$untracked$stashed$renamed$deleted$conflicted$typechanged$ahead_behind]($style)'
ahead = '[рҹҡҖрқ“¬$count ](bold cyan)'
behind = '[рҹҗўрқ“¬$count ](bold purple)'
diverged = 'рҹҰ [вҮЎрқ“¬$ahead_count](bold cyan)[вҮЈрқ“¬$ahead_count](bold purple)'
up_to_date = 'рҹҶ•'
conflicted = 'вҡ”пёҸВ·$count '
untracked = '[рҹҡ§В·$count ](bold purple)'
stashed = '[рҹ“ҰВ·$count ](bold green)'
modified = '[рҹ“қВ·$count ](bold yellow)'
staged = '[рҹ“ӨВ·$count ](bold green)'
renamed = '[вңҚпёҸВ·$count ](bold yellow)'
deleted = 'рҹ—‘пёҸ-$count '

# Make prompt a single line instead of two lines
[line_break]
disabled = false 

[package]
format = 'via [рҹҺҒ $version](208 bold) '
